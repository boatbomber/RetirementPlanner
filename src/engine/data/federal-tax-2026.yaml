# 2026 federal income tax parameters from IRS Rev. Proc. 2025-32
# (Tax Inflation Adjustments for Tax Year 2026, Including Amendments
# from the One Big Beautiful Bill).
#
# Bracket thresholds are LOWER bounds: rate applies once taxable
# income reaches that threshold. Bracket dollars are denominated in
# `base_year` dollars; the simulation engine inflates them by
# cumulativeInflation each year.

source_url: "https://www.irs.gov/pub/irs-drop/rp-25-32.pdf"
last_updated: "2026-04-29"

base_year: 2026

# ─── § 1(j)(2) ordinary income tax rate schedules ───
ordinary_brackets:
  married_filing_jointly:
    - { rate: 0.10, threshold: 0 }
    - { rate: 0.12, threshold: 24800 }
    - { rate: 0.22, threshold: 100800 }
    - { rate: 0.24, threshold: 211400 }
    - { rate: 0.32, threshold: 403550 }
    - { rate: 0.35, threshold: 512450 }
    - { rate: 0.37, threshold: 768700 }
  single:
    - { rate: 0.10, threshold: 0 }
    - { rate: 0.12, threshold: 12400 }
    - { rate: 0.22, threshold: 50400 }
    - { rate: 0.24, threshold: 105700 }
    - { rate: 0.32, threshold: 201775 }
    - { rate: 0.35, threshold: 256225 }
    - { rate: 0.37, threshold: 640600 }
  married_filing_separately:
    - { rate: 0.10, threshold: 0 }
    - { rate: 0.12, threshold: 12400 }
    - { rate: 0.22, threshold: 50400 }
    - { rate: 0.24, threshold: 105700 }
    - { rate: 0.32, threshold: 201775 }
    - { rate: 0.35, threshold: 256225 }
    - { rate: 0.37, threshold: 384350 }
  head_of_household:
    - { rate: 0.10, threshold: 0 }
    - { rate: 0.12, threshold: 17700 }
    - { rate: 0.22, threshold: 67450 }
    - { rate: 0.24, threshold: 105700 }
    - { rate: 0.32, threshold: 201750 }
    - { rate: 0.35, threshold: 256200 }
    - { rate: 0.37, threshold: 640600 }

# ─── § 63(c)(2) standard deduction ───
standard_deduction:
  married_filing_jointly: 32200
  single: 16100
  married_filing_separately: 16100
  head_of_household: 24150

# ─── § 63(f) additional standard deduction for age 65+ ───
# $1,650 for the aged or blind. Bumped to $2,050 if also unmarried
# and not a surviving spouse.
additional_deduction_age_65:
  married: 1650
  single: 2050

# ─── OBBBA senior bonus (§ 63(f)(5), 2025-2028 only) ───
# $6,000 per qualifying taxpayer (age 65+), phasing out at 6% of
# every dollar of MAGI above the threshold.
senior_bonus:
  amount: 6000
  start_year: 2025
  end_year: 2028
  phaseout_rate: 0.06
  phaseout_threshold:
    married_filing_jointly: 150000
    single: 75000
    married_filing_separately: 75000
    head_of_household: 75000

# ─── § 1(h) / § 1(j)(5) long-term capital gains rate brackets ───
# Thresholds are lower bounds. Per Rev. Proc. 2025-32 § 4.03 these
# are the published 0%/15% rate ceilings (so 15% kicks in at the
# 0% ceiling, 20% kicks in at the 15% ceiling).
ltcg_brackets:
  married_filing_jointly:
    - { rate: 0.00, threshold: 0 }
    - { rate: 0.15, threshold: 98900 }
    - { rate: 0.20, threshold: 613700 }
  single:
    - { rate: 0.00, threshold: 0 }
    - { rate: 0.15, threshold: 49450 }
    - { rate: 0.20, threshold: 545500 }
  married_filing_separately:
    - { rate: 0.00, threshold: 0 }
    - { rate: 0.15, threshold: 49450 }
    - { rate: 0.20, threshold: 306850 }
  head_of_household:
    - { rate: 0.00, threshold: 0 }
    - { rate: 0.15, threshold: 66200 }
    - { rate: 0.20, threshold: 579600 }

# ─── § 1411 Net Investment Income Tax ───
# 3.8% on the lesser of net investment income or MAGI in excess of
# the threshold. Statutory thresholds, NOT inflation-indexed.
niit:
  rate: 0.038
  threshold:
    married_filing_jointly: 250000
    single: 200000
    married_filing_separately: 125000
    head_of_household: 200000
