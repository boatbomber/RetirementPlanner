# Per-state 2026 income tax modeling for retirement-planning estimates.
#
# Each entry has bracketed Single and MFJ rates plus a standard
# deduction. Personal exemptions are folded into the deduction as a
# planner-grade approximation, since most states allow std deduction
# and personal exemption additively for a non-itemizing retiree. Tax
# credits (e.g. AZ $100, CA $153, DE $110, NE $176, OR $256) are
# NOT modeled because their value depends on tax liability, not AGI.
#
# Filing-status fallbacks (planner-grade simplification, applied at
# load time, not encoded here):
#   head_of_household  -> single brackets and deduction
#   married_filing_separately -> MFJ brackets and deduction divided by 2
#
# `ltcg_treatment` (optional, default behavior is `ordinary`):
#   ordinary           -> LTCG taxed at ordinary brackets after deduction
#   flat               -> LTCG taxed at a flat preferential rate; ordinary
#                         brackets ignore LTCG (HI cap, MT top LTCG bracket)
#   exclusion          -> a fraction of LTCG is excluded from state AGI;
#                         the remainder is taxed at ordinary brackets
#
# Excluded states (no state income tax in 2026, or capital-gains-only):
#   AK, FL, NH, NV, SD, TN, TX, WY (no state income tax)
#   WA (LTCG-only excise above $278K; not modeled, planner returns 0)
# A state code missing from `states` falls back to 0% state tax.
#
# Bracket and deduction values are NOT inflation-indexed year-over-year
# in this engine. A handful of states (CA, MN, ME, NY, OR) do index in
# real life, so for very long sims those states will tax slightly more
# than reality (bracket creep). Acceptable for planner-grade output.

